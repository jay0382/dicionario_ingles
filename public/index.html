<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Pronúncia Inteligente - NeonDB</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  🎙️ Treino de Pronúncia · Dados na Nuvem (NeonDB)
</header>

<div class="container">
<div style="display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 20px;">
  <a href="/vocabulario.html" style="background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; padding: 10px 20px; border-radius: 40px; text-decoration: none; font-weight: bold;">📚 Ver Vocabulário</a>
  <a href="/expressoes.html" style="background: linear-gradient(135deg, #f59e0b, #d97706); color: white; padding: 10px 20px; border-radius: 40px; text-decoration: none; font-weight: bold;">💬 Expressões do Dia</a>
</div>

  <!-- PAINEL PARA ADICIONAR NOVA PALAVRA -->
  <div class="add-panel">
    <h3>➕ Adicionar nova palavra</h3>
    <div class="form-row">
      <div class="form-field">
        <label>🇧🇷 Português</label>
        <input type="text" id="newPortuguese" placeholder="ex: aceitar" autocomplete="off">
      </div>
      <div class="form-field">
        <label>🇺🇸 Inglês</label>
        <input type="text" id="newEnglish" placeholder="ex: accept" autocomplete="off">
      </div>
      <div class="form-field">
        <label>🔊 Pronúncia (fonética)</label>
        <input type="text" id="newPronunciation" placeholder="ex: âk-SÉPT" autocomplete="off">
      </div>
    </div>
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
      <button class="btn-add" id="addWordBtn">✨ Salvar palavra</button>
      <button class="btn-export" id="exportBtn">📥 Exportar Backup</button>
    </div>
    <div class="info-text">✔ As palavras são salvas no NeonDB (nuvem). Disponível em qualquer dispositivo!</div>
  </div>

  <!-- ÁREA DINÂMICA DAS PALAVRAS -->
  <div id="wordsLibrary"></div>
  <footer>🔊 Clique no botão azul para ouvir a pronúncia. Botão verde para editar.</footer>
</div>

<script src="/js/app.js"></script>
</body>
</html>
