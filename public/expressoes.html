<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Expressões do Dia - NeonDB</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .expression-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      transition: transform 0.2s;
    }
    .expression-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }
    .expression-info {
      flex: 1;
      min-width: 200px;
    }
    .expression-info h3 {
      margin: 0 0 4px 0;
      color: #1e293b;
    }
    .expression-info .pronunciation {
      color: #64748b;
      font-size: 0.9rem;
      margin: 4px 0;
    }
    .expression-info .translation {
      color: #059669;
      font-weight: 500;
      margin: 4px 0;
    }
    .expression-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-sm {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }
    .btn-sm:hover {
      transform: scale(1.05);
    }
    .btn-listen {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
    }
    .btn-edit {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }
    .btn-delete {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }
    .empty-message {
      text-align: center;
      padding: 40px 20px;
      color: #94a3b8;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

<header>
  💬 Expressões do Dia · Dados na Nuvem (NeonDB)
</header>

<div class="container">
  <div style="display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 20px;">
    <a href="/" style="background: linear-gradient(135deg, #0f172a, #1e293b); color: white; padding: 10px 20px; border-radius: 40px; text-decoration: none; font-weight: bold;">🎙️ Voltar para Pronúncia</a>
  </div>

  <!-- PAINEL PARA ADICIONAR -->
  <div class="add-panel">
    <h3>➕ Adicionar nova expressão</h3>
    <div class="form-row">
      <div class="form-field">
        <label>🇺🇸 Inglês</label>
        <input type="text" id="newEnglish" placeholder="ex: How are you?" autocomplete="off">
      </div>
      <div class="form-field">
        <label>🇧🇷 Português</label>
        <input type="text" id="newPortuguese" placeholder="ex: Como você está?" autocomplete="off">
      </div>
      <div class="form-field">
        <label>🔊 Pronúncia (fonética)</label>
        <input type="text" id="newPronunciation" placeholder="ex: HÁU AR IÚ?" autocomplete="off">
      </div>
    </div>
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
      <button class="btn-add" id="addExpressionBtn">✨ Salvar expressão</button>
      <button class="btn-export" id="exportExpressionsBtn">📥 Exportar Backup</button>
    </div>
    <div class="info-text">✔ As expressões são salvas no NeonDB (nuvem). Disponível em qualquer dispositivo!</div>
  </div>

  <!-- ÁREA DINÂMICA -->
  <div id="expressionsLibrary"></div>
</div>

<footer>
  🔊 Clique no botão azul para ouvir a pronúncia. Botão verde para editar.
</footer>

<script src="js/expressoes.js"></script>
</body>
</html>
